services:
  gymtracker:
    build: .
    container_name: gymtracker
    ports:
      - "8000:8000"
    environment:
      # CHANGE THESE before any real use:
      APP_USERNAME: "${APP_USERNAME:-admin}"
      APP_PASSWORD: "${APP_PASSWORD:-changeme}"
      SECRET_KEY: "${SECRET_KEY:-please-change-this-secret}"
      GYM_DB_PATH: /data/gym.db
      # The spreadsheet is committed to the repo root, so the build bakes it
      # into the image at /app/Exercises_2.xlsx (no host mount needed).
      GYM_XLSX_PATH: /app/Exercises_2.xlsx
    volumes:
      - gym-data:/data
    restart: unless-stopped

volumes:
  gym-data:
