<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>{% block title %}Gym Tracker{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="{{ url_for('routines') }}">🏋️ Gym Tracker</a>
    {% if session.get('user') %}
    <nav>
      <a href="{{ url_for('routines') }}">Sessions</a>
      <a href="{{ url_for('progress') }}">Progress</a>
      <a href="{{ url_for('history') }}">History</a>
      <a href="{{ url_for('logout') }}">Logout</a>
    </nav>
    {% endif %}
  </header>

  <main class="container">
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="flash">{% for m in messages %}<p>{{ m }}</p>{% endfor %}</div>
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
